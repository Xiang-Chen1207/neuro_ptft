task_type: pretraining
output_dir: output/tueg_dev/csbrain_joint_10s
device: cuda
epochs: 50
clip_grad: 1.0
metric_key: loss
val_freq_split: 5

enable_wandb: true
project: "ptft-csbrain-tueg-10s"
entity: "bci-foundation-model"

dataset:
  name: TUEG
  dataset_dir: /vePFS-0x0d/pretrain-clip/output_tuh_full_pipeline/merged_final_dataset
  feature_path: /vePFS-0x0d/home/dht/eeg_feature_extraction_full/results/tuep/features_zscore.csv
  seed: 42
  batch_size: 128
  num_workers: 12
  train_num_workers: 12
  val_num_workers: 0
  persistent_workers: true
  val_persistent_workers: false
  prefetch_factor: 6
  pin_memory: true
  input_size: 1000
  patch_size: 200
  required_num_channels: 21
  io_group_shuffle: true
  io_group_chunk_size: 2048
  h5_rdcc_nbytes: 67108864
  h5_cache_size: 512
  enable_feature_filter_cache: true

model:
  name: csbrain
  use_pretrained: false
  in_dim: 200
  out_dim: 200
  d_model: 200
  dim_feedforward: 800
  seq_len: 5
  n_layer: 12
  nhead: 8
  num_channels: 19
  pretrain_tasks: [reconstruction, feature_pred]
  feature_dim: 62
  feature_token_type: cross_attn
  feature_token_strategy: single
  feature_group_count: 5

loss:
  name: mse
  feature_loss_weight: 1.0
  use_dynamic_loss: false

optimizer:
  name: AdamW
  lr: 1e-3
  weight_decay: 0.05

scheduler:
  name: CosineAnnealingLR
  T_max: 50
  eta_min: 1.0e-6
